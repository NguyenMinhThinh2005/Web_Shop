<body class="bg-background text-on-background font-body-md min-h-screen flex items-center justify-center p-md md:p-xl">
<main class="w-full max-w-[600px] bg-surface-container-lowest rounded-2xl shadow-xl overflow-hidden animate-[fadeIn_0.5s_ease-out]">
<!-- Header / Logo Area (Transactional logic applies: No Nav, Just Logo) -->
<div class="px-xl pt-xl pb-md text-center">
<span class="font-headline-md text-headline-md font-bold text-primary">Chú Tám Tán Xe</span>
</div>
<!-- Success Content -->
<div class="px-xl pb-xl flex flex-col items-center text-center">
<!-- Animated Checkmark Icon -->
<div class="w-24 h-24 mb-md rounded-full bg-secondary-container text-on-secondary-container flex items-center justify-center transform transition-transform hover:scale-110 duration-300">
<span class="material-symbols-outlined text-[64px]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<!-- Order Confirmation Details -->
<h1 class="font-headline-lg text-headline-lg mb-sm text-on-surface">Đặt hàng thành công!</h1>
<div class="bg-surface-container-low rounded-xl px-lg py-sm mb-lg shadow-sm border border-surface-container-high w-full max-w-sm">
<p class="font-label-sm text-label-sm text-on-surface-variant mb-xs">Mã Đơn Hàng</p>
<p class="font-headline-md text-headline-md text-primary font-bold">#CT-8892</p>
</div>
<p class="font-body-lg text-body-lg text-on-surface-variant mb-xl max-w-[400px]">
                Đơn đã được gửi, tư vấn viên sẽ liên hệ xác nhận trong thời gian sớm nhất.
            </p>
<!-- Optional Login Section (Bento Grid inspired card) -->
<div class="w-full bg-surface-container rounded-2xl p-lg text-left shadow-sm border border-surface-container-high transition-all hover:shadow-md hover:border-outline-variant">
<div class="flex items-start gap-md mb-md">
<div class="bg-primary-container text-on-primary-container p-sm rounded-lg flex-shrink-0">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">account_circle</span>
</div>
<div>
<h2 class="font-headline-md text-headline-md text-on-surface mb-xs">Tạo tài khoản nhanh?</h2>
<p class="font-body-md text-body-md text-on-surface-variant">
                            Đăng nhập để lần sau đặt nhanh hơn, không cần nhập lại địa chỉ. Theo dõi đơn hàng dễ dàng.
                        </p>
</div>
</div>
<div class="flex flex-col sm:flex-row gap-md mt-md">
<button class="flex-1 bg-primary-container hover:bg-primary-fixed-dim text-on-primary-container font-label-md text-label-md py-sm px-lg rounded-xl shadow-md transition-all active:scale-95 text-center flex justify-center items-center gap-sm">
                        Đăng nhập
                        <span class="material-symbols-outlined text-[20px]">login</span>
</button>
<button class="flex-1 bg-transparent hover:bg-surface-variant text-on-surface-variant font-label-md text-label-md py-sm px-lg rounded-xl border border-outline-variant transition-all active:scale-95 text-center">
                        Để sau
                    </button>
</div>
</div>
</div>
<!-- Action to return to store -->
<div class="border-t border-surface-container-high p-md text-center bg-surface-container-lowest">
<button class="text-primary hover:text-primary-fixed-dim font-label-md text-label-md transition-colors flex items-center justify-center gap-xs mx-auto">
<span class="material-symbols-outlined text-[18px]">arrow_back</span>
                Quay lại cửa hàng
            </button>
</div>
</main>
<style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
